<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozcestník Služeb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f1115',
                        neonBlue: '#17a2ff',
                        neonRed: '#ff4d3f'
                    }
                }
            }
        }
    </script>
    <style>
        .hover-scale { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-scale:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-darkBg text-gray-200 font-sans h-screen m-0 p-0 overflow-hidden flex flex-col md:flex-row relative">

    <!-- Servis Elektrokoloběžek -->
    <a href="servis.html" class="flex-1 relative group cursor-pointer overflow-hidden block h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-800">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-30 group-hover:opacity-40 grayscale group-hover:grayscale-0"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-darkBg via-darkBg/80 to-transparent"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center text-white z-10 transition-transform duration-500 group-hover:-translate-y-4">
            <h2 class="text-4xl md:text-6xl font-black mb-4 drop-shadow-2xl text-white tracking-tighter">Servis <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-400 to-white">E-Mobility</span></h2>
            <p class="text-xl md:text-2xl font-light text-gray-400 drop-shadow-lg tracking-wide uppercase">Elektrokoloběžky & Elektrokola</p>
            <div class="mt-12 px-10 py-4 border border-gray-500 rounded-full uppercase tracking-widest text-sm font-bold opacity-0 group-hover:opacity-100 transition-all duration-500 bg-white/5 backdrop-blur-md hover:bg-white hover:text-black">
                Vstoupit do sekce
            </div>
        </div>
    </a>

    <!-- Technologie bez vrásek -->
    <a href="it-sluzby.html" class="flex-1 relative group cursor-pointer overflow-hidden block h-1/2 md:h-full">
        <!-- Zářící pozadí pro IT sekci -->
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-10 group-hover:opacity-20 mix-blend-screen"></div>
        <div class="absolute inset-0 bg-darkBg/95 group-hover:bg-darkBg/90 transition-colors duration-500"></div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-neonBlue/5 group-hover:bg-neonBlue/10 blur-[100px] rounded-full pointer-events-none transition-colors duration-700"></div>

        <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-10 transition-transform duration-500 group-hover:-translate-y-4">

            <div class="relative mb-12">
                <div class="absolute inset-0 bg-neonRed/20 blur-[40px] rounded-full group-hover:bg-neonRed/30 transition-colors duration-500"></div>
                <img src="img/logo.png" alt="Logo Technologie bez vrásek" class="relative z-10 h-32 md:h-48 w-auto drop-shadow-[0_0_20px_rgba(255,77,63,0.3)] group-hover:scale-105 transition-transform duration-500">
            </div>

            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 text-white tracking-tight">
                Technologie <span class="text-transparent bg-clip-text bg-gradient-to-r from-neonBlue to-neonRed">bez vrásek</span>
            </h2>
            <p class="text-xl md:text-2xl font-light text-gray-400 drop-shadow-lg">IT služby pro lidi, podnikatele a malé firmy</p>

            <div class="mt-12 px-10 py-4 border border-neonBlue/50 rounded-full uppercase tracking-widest text-sm font-bold opacity-0 group-hover:opacity-100 transition-all duration-500 bg-neonBlue/10 backdrop-blur-md text-neonBlue hover:bg-neonBlue hover:text-white hover:border-neonBlue shadow-[0_0_20px_rgba(23,162,255,0.2)] hover:shadow-[0_0_30px_rgba(23,162,255,0.5)]">
                Vstoupit do sekce
            </div>
        </div>
    </a>

</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozcestník Služeb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hover-scale { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-scale:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-[#111] text-gray-200 font-sans h-screen m-0 p-0 overflow-hidden flex flex-col md:flex-row">

    <!-- Servis Elektrokoloběžek -->
    <a href="servis.html" class="flex-1 relative group cursor-pointer overflow-hidden block h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-800">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-40 group-hover:opacity-60"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center text-white z-10 transition-transform duration-500 group-hover:-translate-y-4">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 drop-shadow-2xl">Servis E-Mobility</h2>
            <p class="text-xl md:text-2xl font-light text-gray-300 drop-shadow-lg">Elektrokoloběžky, elektrokola a další</p>
            <div class="mt-8 px-8 py-3 border border-gray-400 rounded-full uppercase tracking-widest text-sm font-semibold opacity-0 group-hover:opacity-100 transition-all duration-500 bg-white/10 backdrop-blur-sm hover:bg-white hover:text-black">
                Vstoupit do sekce
            </div>
        </div>
    </a>

    <!-- Technologie bez vrásek -->
    <a href="it-sluzby.html" class="flex-1 relative group cursor-pointer overflow-hidden block h-1/2 md:h-full">
        <!-- Tmavé abstraktní IT pozadí místo původní modré -->
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-20 group-hover:opacity-40"></div>
        <div class="absolute inset-0 bg-[#1a1a1a]/90 group-hover:bg-[#1a1a1a]/80 transition-colors duration-500"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center text-white z-10 transition-transform duration-500 group-hover:-translate-y-4">

            <img src="img/logo.png" alt="Logo Technologie bez vrásek" class="h-32 md:h-48 w-auto mb-8 drop-shadow-[0_0_25px_rgba(255,45,85,0.4)] group-hover:drop-shadow-[0_0_40px_rgba(255,45,85,0.6)] transition-all duration-500">

            <h2 class="text-4xl md:text-5xl font-bold mb-4 drop-shadow-2xl tracking-wide">Technologie bez vrásek</h2>
            <p class="text-xl md:text-2xl font-light text-gray-400 drop-shadow-lg">IT služby pro lidi, podnikatele a malé firmy</p>
            <div class="mt-8 px-8 py-3 border border-blue-500/50 rounded-full uppercase tracking-widest text-sm font-semibold opacity-0 group-hover:opacity-100 transition-all duration-500 bg-[#2d68ff]/10 backdrop-blur-sm text-[#2d68ff] hover:bg-[#2d68ff] hover:text-white shadow-[0_0_15px_rgba(45,104,255,0.3)]">
                Vstoupit do sekce
            </div>
        </div>
    </a>

</body>
</html>
